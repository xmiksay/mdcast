name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_BUILD_JOBS: 4

jobs:
  # Publish to crates.io on every version tag. Authenticates via crates.io
  # Trusted Publishing (OIDC) — no long-lived registry token in secrets.
  #
  # No `make verify` re-run here: the tagged commit is a just-merged,
  # CI-green master commit (ci.yml's `test` job already ran on its PR and
  # again on merge), and `cargo publish` performs its own verification
  # build. We only assert that commit actually has a passing `test` run
  # before publishing on top of it.
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mdcast") | .version')"
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match Cargo.toml version $version" >&2
            exit 1
          fi

      - name: Verify tag commit passed CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          conclusion="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs" \
            --jq '[.check_runs[] | select(.name == "test")] | sort_by(.started_at) | last | .conclusion')"
          if [ "$conclusion" != "success" ]; then
            echo "Tag commit ${GITHUB_SHA} has no successful 'test' check run (found: ${conclusion:-none})" >&2
            exit 1
          fi

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
