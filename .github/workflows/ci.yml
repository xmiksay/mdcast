name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_BUILD_JOBS: 4

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo check (no default features)
        run: cargo check --no-default-features

      - name: cargo check (pandoc only)
        run: cargo check --no-default-features --features pandoc

      - name: cargo check (typst only)
        run: cargo check --no-default-features --features typst

      - name: cargo test
        run: cargo test
